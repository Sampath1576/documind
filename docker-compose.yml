version: '3.8'

services:
  app:
    build: .
    container_name: documind-app
    ports:
      - "8000:8000"
      - "7860:7860"
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./uploads:/app/uploads
      - ./mlruns:/app/mlruns
      - ./logs:/app/logs
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - EMBEDDING_DEVICE=cpu
    depends_on:
      - mlflow
    networks:
      - documind-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: documind-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlruns/mlflow.db
      --default-artifact-root /mlruns/artifacts
      --host 0.0.0.0
      --port 5000
    networks:
      - documind-network
    restart: unless-stopped

networks:
  documind-network:
    driver: bridge